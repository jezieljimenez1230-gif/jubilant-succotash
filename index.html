<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cozy Side Spot| virtual_paradise.exe</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=VT323&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink-main: #ff80ab;
            --pink-soft: #ffd6ec;
            --pink-dark: #d81b60;
            --lace-shadow: rgba(255, 128, 171, 0.4);
        }

        * { cursor: url('https://cur.cursors-4u.net/cursors/cur-2/cur116.cur'), auto !important; }

        body {
            margin: 0;
            background: var(--pink-soft);
            font-family: 'VT323', monospace;
            overflow: hidden;
            background-image: radial-gradient(white 2px, transparent 0);
            background-size: 40px 40px;
        }

        /* --- STAGE 1: THE STARTUP LOADER --- */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .loader-bar {
            width: 200px;
            height: 10px;
            border: 2px solid var(--pink-main);
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: var(--pink-main);
            transition: width 2s ease-in-out;
        }

        /* --- STAGE 2: THE DESKTOP --- */
        #desktop {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(180deg, var(--pink-soft) 0%, #fff 100%);
        }

        .icon {
            width: 90px;
            text-align: center;
            position: absolute;
            color: var(--pink-dark);
            transition: transform 0.2s, filter 0.2s;
            filter: drop-shadow(2px 2px 0px white);
        }

        .icon:hover {
            transform: scale(1.1) rotate(5deg);
            filter: drop-shadow(0 0 10px var(--pink-main));
        }

        .icon img { width: 50px; image-rendering: pixelated; }

        /* --- STAGE 3: THE WINDOWS (Glassmorphism & Depth) --- */
        .window {
            position: absolute;
            width: 350px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border: 3px solid var(--pink-main);
            border-radius: 8px;
            box-shadow: 8px 8px 0px var(--lace-shadow);
            display: none;
            z-index: 10;
        }

        .window.active { z-index: 100; box-shadow: 12px 12px 0px var(--pink-main); }

        .titlebar {
            background: var(--pink-main);
            color: white;
            padding: 8px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Dancing Script', cursive;
            font-size: 1.2em;
        }

        .win-btns span {
            background: white;
            color: var(--pink-main);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            margin-left: 5px;
            font-family: sans-serif;
            font-weight: bold;
        }

        .content {
            padding: 15px;
            font-size: 18px;
            color: var(--pink-dark);
            line-height: 1.4;
        }

        /* --- STAGE 4: INTERACTIVE FX --- */
        .heart {
            position: fixed;
            bottom: -50px;
            font-size: 24px;
            pointer-events: none;
            z-index: 5;
            filter: drop-shadow(0 0 5px white);
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            color: gold;
            font-size: 20px;
            z-index: 999;
            animation: sparkle-anim 0.8s forwards;
        }

        @keyframes sparkle-anim {
            0% { transform: scale(0) rotate(0); opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }

        /* --- UI ELEMENTS --- */
        #taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: var(--pink-main);
            border-top: 3px solid white;
            display: flex;
            align-items: center;
            padding: 0 10px;
            color: white;
            justify-content: space-between;
            z-index: 1000;
        }

        button {
            background: var(--pink-main);
            border: 2px solid white;
            color: white;
            padding: 5px 15px;
            font-family: 'VT323';
            font-size: 16px;
            border-radius: 5px;
            transition: 0.2s;
        }

        button:hover {
            background: white;
            color: var(--pink-main);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<div id="boot-screen">
    <h1 style="color:var(--pink-main); font-family:'Dancing Script'">Loading Mimikitty OS...</h1>
    <div class="loader-bar"><div class="loader-fill" id="fill"></div></div>
</div>

<div id="desktop">
    <div class="icon" style="top:40px;left:40px" onclick="openWin('about')">
        <img src="https://img.icons8.com/plasticine/100/null/macbook.png"><br>ABOUT.txt
    </div>
    <div class="icon" style="top:150px;left:40px" onclick="openWin('gallery')">
        <img src="https://img.icons8.com/plasticine/100/null/camera.png"><br>PHOTOS.exe
    </div>
    <div class="icon" style="top:260px;left:40px" onclick="openWin('guest')">
        <img src="https://img.icons8.com/plasticine/100/null/envelope.png"><br>MAIL.lnk
    </div>

    <div class="window" id="about">
        <div class="titlebar" onmousedown="focusWin('about')"><span>About Orpha 💕</span><div class="win-btns"><span>_</span><span onclick="closeWin('about')">X</span></div></div>
        <div class="content">
            <marquee scrollamount="3">Welcome to my digital sanctuary! ✨</marquee>
            Hi! I'm Orpha. I curate soft vibes and anime aesthetics. 
            <hr style="border: 1px dashed var(--pink-main)">
            <b>Status:</b> Living the pink dream 🎀
        </div>
    </div>

    <div class="window" id="gallery">
        <div class="titlebar" onmousedown="focusWin('gallery')"><span>Gallery 🎀</span><div class="win-btns"><span>_</span><span onclick="closeWin('gallery')">X</span></div></div>
        <div class="content">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div style="background:var(--pink-soft); height: 80px; border-radius:5px; border:1px solid var(--pink-main)"></div>
                <div style="background:var(--pink-soft); height: 80px; border-radius:5px; border:1px solid var(--pink-main)"></div>
            </div>
            <p style="text-align:center">Uploading more cute things soon... 💗</p>
        </div>
    </div>

    <div class="window" id="guest">
        <div class="titlebar" onmousedown="focusWin('guest')"><span>Guestbook 💌</span><div class="win-btns"><span>_</span><span onclick="closeWin('guest')">X</span></div></div>
        <div class="content">
            <input id="name" placeholder="Name" style="width:100%; margin-bottom:5px; border:2px solid var(--pink-soft); padding:5px;">
            <textarea id="msg" placeholder="Message" style="width:100%; height:60px; border:2px solid var(--pink-soft); padding:5px;"></textarea>
            <button onclick="addMsg()" style="width:100%">Send to Orpha 💖</button>
            <div id="messages" style="margin-top:10px; max-height:100px; overflow-y:auto; border-top:1px solid var(--pink-main)"></div>
        </div>
    </div>
</div>

<div id="taskbar">
    <div style="font-weight:bold">🌸 START</div>
    <div id="clock"></div>
</div>

<script>
    // Boot sequence
    window.onload = () => {
        const fill = document.getElementById('fill');
        fill.style.width = '100%';
        setTimeout(() => {
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('boot-screen').remove(), 1000);
        }, 2200);
    };

    // Enhanced Window Logic
    function openWin(id) {
        let w = document.getElementById(id);
        w.style.display = 'block';
        focusWin(id);
    }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }
    function focusWin(id) {
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Draggable Logic
    let activeWin = null;
    let offset = [0,0];
    document.querySelectorAll('.titlebar').forEach(bar => {
        bar.addEventListener('mousedown', (e) => {
            activeWin = bar.parentElement;
            offset = [activeWin.offsetLeft - e.clientX, activeWin.offsetTop - e.clientY];
            focusWin(activeWin.id);
        });
    });

    document.addEventListener('mousemove', (e) => {
        if (activeWin) {
            activeWin.style.left = (e.clientX + offset[0]) + 'px';
            activeWin.style.top = (e.clientY + offset[1]) + 'px';
        }
        // Sparkle Trail
        if (Math.random() > 0.😎 {
            let s = document.createElement('div');
            s.className = 'sparkle';
            s.innerHTML = '✨';
            s.style.left = e.pageX + 'px';
            s.style.top = e.pageY + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 800);
        }
    });

    document.addEventListener('mouseup', () => activeWin = null);

    // Dynamic Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Heart Fountain
    setInterval(() => {
        let h = document.createElement('div');
        h.className = 'heart';
        h.innerHTML = ['💗','🎀','🌸','✨'][Math.floor(Math.random()*4)];
        h.style.left = Math.random() * 100 + 'vw';
        h.style.transition = transform ${4 + Math.random()*4}s linear, opacity 2s;
        document.body.appendChild(h);
        setTimeout(() => {
            h.style.transform = translateY(-110vh) rotate(${Math.random()*360}deg);
        }, 100);
        setTimeout(() => h.remove(), 8000);
    }, 700);

    function addMsg(){
        let n = document.getElementById('name').value;
        let m = document.getElementById('msg').value;
        if(!n || !m) return;
        let p = document.createElement('div');
        p.innerHTML = <small>${new Date().toLocaleTimeString()}</small><br><b>${n}:</b> ${m}<hr>;
        document.getElementById('messages').prepend(p);
    }
</script>

</body>
</html>
